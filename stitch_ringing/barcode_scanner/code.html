<!DOCTYPE html>

<html class="dark" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QRバーコードアラーム - スキャン</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

              "tertiary-container": "#f09594",

              "inverse-primary": "#7c572d",

              "on-secondary-fixed-variant": "#4b4641",

              "on-secondary": "#34302b",

              "surface-variant": "#353534",
              "secondary": "#cdc5bf"
            },
            fontFamily: {
              "headline": ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
              "body": ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
              "label": ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .scan-mask {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
        }
        .scan-frame-clear {
            background: transparent;
            box-shadow: 0 0 0 1000vmax rgba(0, 0, 0, 0.4);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-surface-dim text-on-surface font-body font-light selection:bg-primary/30 antialiased overflow-hidden">
<!-- Camera Feed Mockup -->
<div class="fixed inset-0 z-0">
<img alt="Bedroom interior at night" class="w-full h-full object-cover" data-alt="Dimly lit modern bedroom interior for camera feed" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4US_QZsIEZlqly8QxrCPS_fbBSZp-DbYot48Qgfzs4QkVSiCM8efStOW8h_LSB4KMy4d4Z0C_1pabKN0xKsrsR38Dx9E2csftt9RxMwMovJ91t5an0JOUfh2_wPGdscjdqTdYYmiWe0BM2bjJgdy7Er4W_wtYKEPJwSABlTTACW_MHDLSlvLlNc6IEVf9Sr6XaHTFgpGvm0EYqLagdlpO96f_vFgGJPcZvn2Wgq22Fx876pP6Mp8s-5ECNlds5-lQlJmHAP_qOdQ"/>
</div>
<!-- Scanning Overlay Interface -->
<div class="relative z-10 flex flex-col h-screen w-full">
<!-- Top Navigation Area (Supressed Shell, focused on Task) -->
<header class="flex justify-between items-center w-full px-10 h-24">
<div class="flex flex-col">
<span class="text-[#6B6560] text-xs tracking-[0.2em] font-light">SCANNING</span>
<h1 class="font-headline font-medium tracking-widest text-sm text-[#D4A574]">QRバーコードアラーム</h1>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-black/40 backdrop-blur-md text-on-surface hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Main Scan Viewport -->
<main class="flex-grow flex items-center justify-center relative">
<!-- Central Scan Frame -->
<div class="relative">
<!-- Visual Frame Borders -->
<div class="w-[240px] h-[240px] border-[1.5px] border-[#D4A574] rounded-lg relative z-20 scan-frame-clear">
<!-- Corner Accents -->
<div class="absolute -top-[2px] -left-[2px] w-8 h-8 border-t-4 border-l-4 border-[#D4A574] rounded-tl-lg"></div>
<div class="absolute -top-[2px] -right-[2px] w-8 h-8 border-t-4 border-r-4 border-[#D4A574] rounded-tr-lg"></div>
<div class="absolute -bottom-[2px] -left-[2px] w-8 h-8 border-b-4 border-l-4 border-[#D4A574] rounded-bl-lg"></div>
<div class="absolute -bottom-[2px] -right-[2px] w-8 h-8 border-b-4 border-r-4 border-[#D4A574] rounded-br-lg"></div>
<!-- Scanning Line Simulation (Static for UI) -->
<div class="absolute top-1/2 left-4 right-4 h-[1px] bg-[#D4A574]/40 blur-[1px]"></div>
</div>
</div>
</main>
<!-- Bottom UI Area -->
<footer class="flex flex-col items-center justify-center pb-20 px-10 space-y-8">
<!-- Status Pill -->
<div class="bg-black/70 backdrop-blur-xl px-8 py-4 rounded-full border border-outline-variant/20 flex items-center gap-3">
<span class="material-symbols-outlined text-[#D4A574] text-xl" data-icon="qr_code_scanner">qr_code_scanner</span>
<span class="text-on-surface font-light tracking-wide text-sm">QR / バーコードをスキャンして解除</span>
</div>
<!-- Controls -->
<div class="flex items-center gap-10">
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-container/40 backdrop-blur-lg flex items-center justify-center border border-outline-variant/10 group-hover:bg-surface-container/60 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="flashlight_on">flashlight_on</span>
</div>
<span class="text-[10px] font-headline font-medium tracking-widest text-[#6B6560]">ライト</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-container/40 backdrop-blur-lg flex items-center justify-center border border-outline-variant/10 group-hover:bg-surface-container/60 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="keyboard">keyboard</span>
</div>
<span class="text-[10px] font-headline font-medium tracking-widest text-[#6B6560]">手動入力</span>
</button>
</div>
</footer>
</div>
<!-- BottomNavBar (Suppressed as per rules: Task-Focused Screen) -->
</body></html>
