<!DOCTYPE html>

<html class="dark" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QRバーコードアラーム - 初回起動</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error": "#ffb4ab",
              "tertiary": "#ffb7b6",
              "outline": "#9c8e82",
              "on-primary-fixed": "#2c1700",
              "on-error-container": "#ffdad6",
              "on-tertiary": "#581b1e",
              "on-surface-variant": "#d4c4b7",
              "primary-container": "#d4a574",
              "inverse-on-surface": "#313030",
              "outline-variant": "#50453b",
              "tertiary-fixed": "#ffdad9",
              "secondary-fixed-dim": "#cdc5bf",
              "on-error": "#690005",
              "error-container": "#93000a",
              "surface-container": "#201f1f",
              "surface-container-highest": "#353534",
              "surface-container-lowest": "#0e0e0e",
              "secondary-container": "#4b4641",
              "on-primary-fixed-variant": "#614018",
              "surface": "#131313",
              "on-tertiary-fixed": "#3c060b",
              "tertiary-container": "#f09594",
              "on-primary-container": "#5b3a13",
              "background": "#131313",
              "surface-container-low": "#1c1b1b",
              "surface-tint": "#efbd8a",
              "on-tertiary-container": "#6e2c2e",
              "surface-bright": "#3a3939",
              "on-background": "#e5e2e1",
              "on-primary": "#472a03",
              "surface-container-high": "#2a2a2a",
              "on-secondary-fixed": "#1f1b17",
              "on-tertiary-fixed-variant": "#753133",
              "inverse-primary": "#7c572d",
              "on-surface": "#e5e2e1",
              "surface-dim": "#131313",
              "inverse-surface": "#e5e2e1",
              "secondary-fixed": "#eae1da",
              "on-secondary-container": "#bcb4ae",
              "on-secondary-fixed-variant": "#4b4641",
              "primary-fixed": "#ffdcbc",
              "tertiary-fixed-dim": "#ffb3b2",
              "primary-fixed-dim": "#efbd8a",
              "on-secondary": "#34302b",
              "primary": "#f2c08d",
              "surface-variant": "#353534",
              "secondary": "#cdc5bf"
            },
            fontFamily: {
              "headline": ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica", "Arial", "sans-serif"],
              "body": ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica", "Arial", "sans-serif"],
              "label": ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica", "Arial", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;
      }
      body {
        background-color: #131313;
        color: #e5e2e1;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
</head>
<body class="font-body selection:bg-primary/30 antialiased overflow-hidden font-light">
<!-- BACKGROUND: Home Screen (Simulated) -->
<div class="fixed inset-0 z-0 flex flex-col opacity-40 grayscale-[0.5]">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-10 h-16 bg-[#0A0A0A] docked full-width top-0">
<h1 class="font-headline font-light tracking-widest text-sm text-[#6B6560]">QRバーコードアラーム</h1>
<button class="text-xs tracking-[0.2em] font-light text-[#6B6560] hover:opacity-80 transition-opacity">
                コード登録
            </button>
</header>
<!-- Main Content (Simulated Home) -->
<main class="flex-1 px-10 pt-12 space-y-12">
<section>
<div class="text-[100px] font-headline font-thin tracking-tighter text-[#F5F0EB] leading-none mb-2">06:45</div>
<p class="text-[#6B6560] font-headline font-light tracking-widest text-sm uppercase">Wednesday, Oct 23</p>
</section>
<section class="space-y-4">
<div class="bg-surface-container-low rounded-lg p-8 flex justify-between items-center">
<div>
<div class="text-3xl font-light text-on-surface">07:30</div>
<div class="text-sm font-light text-secondary">平日</div>
</div>
<div class="w-12 h-6 bg-surface-container-high rounded-full relative">
<div class="absolute right-1 top-1 w-4 h-4 bg-on-background rounded-full"></div>
</div>
</div>
<div class="bg-surface-container-low rounded-lg p-8 flex justify-between items-center">
<div>
<div class="text-3xl font-light text-secondary">08:00</div>
<div class="text-sm font-light text-secondary/50">休日</div>
</div>
<div class="w-12 h-6 bg-surface-container-high rounded-full relative">
<div class="absolute left-1 top-1 w-4 h-4 bg-secondary-container rounded-full"></div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-10 flex justify-around items-center px-10 pb-8 h-24 bg-[#0A0A0A]/80 backdrop-blur-xl border-t border-[#1E1C1A] rounded-t-[2rem]">
<div class="flex flex-col items-center justify-center text-[#D4A574] bg-[#201F1F] rounded-full p-3">
<span class="material-symbols-outlined">alarm</span>
</div>
<div class="flex flex-col items-center justify-center text-[#6B6560] p-3">
<span class="material-symbols-outlined">qr_code_scanner</span>
</div>
<div class="flex flex-col items-center justify-center text-[#6B6560] p-3">
<span class="material-symbols-outlined">settings</span>
</div>
</nav>
</div>
<!-- ONBOARDING OVERLAY -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-6">
<!-- ONBOARDING CARD -->
<div class="w-full max-w-sm bg-surface-container-low rounded-[2rem] overflow-hidden flex flex-col items-center text-center p-10 space-y-8 animate-fade-in border border-outline-variant/10">
<!-- Top: minimal camera icon -->
<div class="w-24 h-24 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-6xl" style="font-variation-settings: 'wght' 200;">
                    qr_code_scanner
                </span>
</div>
<!-- Content -->
<div class="space-y-4">
<h2 class="text-2xl font-headline font-light text-on-surface tracking-tight leading-snug">
                    QR / バーコードを<br/>登録しましょう
                </h2>
<p class="text-sm text-secondary font-body font-light leading-relaxed px-2">
                    アラーム解除に使う QR コードまたはバーコードを登録してください。お手元の商品やカードのバーコードでも OK です。
                </p>
</div>
<!-- Actions -->
<div class="w-full flex flex-col space-y-4 pt-4">
<button class="w-full py-5 bg-primary-container text-on-primary-container font-headline font-medium rounded-full active:scale-95 transition-transform duration-300">
                    今すぐ登録する
                </button>
<button class="w-full py-2 text-[#6B6560] font-headline font-light text-sm tracking-widest hover:text-on-surface transition-colors active:scale-95 transition-transform duration-300">
                    あとで登録する
                </button>
</div>
</div>
</div>
<!-- Background Pattern/Mood (Subtle) -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-20">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-fixed-dim/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
