<!DOCTYPE html>

<html class="dark" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QRバーコードアラーム - Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error": "#ffb4ab",
              "tertiary": "#ffb7b6",
              "outline": "#9c8e82",
              "on-primary-fixed": "#2c1700",
              "on-error-container": "#ffdad6",
              "on-tertiary": "#581b1e",
              "on-surface-variant": "#d4c4b7",
              "primary-container": "#d4a574",
              "inverse-on-surface": "#313030",
              "outline-variant": "#50453b",
              "tertiary-fixed": "#ffdad9",
              "secondary-fixed-dim": "#cdc5bf",
              "on-error": "#690005",
              "error-container": "#93000a",
              "surface-container": "#201f1f",
              "surface-container-highest": "#353534",
              "surface-container-lowest": "#0e0e0e",
              "secondary-container": "#4b4641",
              "on-primary-fixed-variant": "#614018",
              "surface": "#131313",
              "on-tertiary-fixed": "#3c060b",
              "tertiary-container": "#f09594",
              "on-primary-container": "#5b3a13",
              "background": "#131313",
              "surface-container-low": "#1c1b1b",
              "surface-tint": "#efbd8a",
              "on-tertiary-container": "#6e2c2e",
              "surface-bright": "#3a3939",
              "on-background": "#e5e2e1",
              "on-primary": "#472a03",
              "surface-container-high": "#2a2a2a",
              "on-secondary-fixed": "#1f1b17",
              "on-tertiary-fixed-variant": "#753133",
              "inverse-primary": "#7c572d",
              "on-surface": "#e5e2e1",
              "surface-dim": "#131313",
              "inverse-surface": "#e5e2e1",
              "secondary-fixed": "#eae1da",
              "on-secondary-container": "#bcb4ae",
              "on-secondary-fixed-variant": "#4b4641",
              "primary-fixed": "#ffdcbc",
              "tertiary-fixed-dim": "#ffb3b2",
              "primary-fixed-dim": "#efbd8a",
              "on-secondary": "#34302b",
              "primary": "#f2c08d",
              "surface-variant": "#353534",
              "secondary": "#cdc5bf"
            },
            fontFamily: {
              "headline": ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica", "Arial", "sans-serif"],
              "body": ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica", "Arial", "sans-serif"],
              "label": ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica", "Arial", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #0A0A0A;
        color: #E5E2E1;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
</head>
<body class="font-body selection:bg-primary-container/30">
<!-- TopAppBar -->
<header class="bg-[#0A0A0A] docked full-width top-0 flex justify-between items-center w-full px-10 h-16 sticky z-50">
<h1 class="font-light tracking-widest text-sm text-[#6B6560]">QRバーコードアラーム</h1>
<button class="bg-surface-container-highest text-[#D4A574] px-5 py-1.5 rounded-full text-xs font-medium tracking-wider hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-300">
            コード登録
        </button>
</header>
<main class="min-h-screen px-10 pt-12 pb-32 max-w-2xl mx-auto">
<!-- Greeting Area -->
<section class="mb-16">
<h2 class="text-3xl font-light text-[#F5F0EB] tracking-tight">おはようございます ☀️</h2>
</section>
<!-- Alarm List Section -->
<section class="space-y-4">
<!-- Active Alarm Card 1 -->
<div class="flex items-center justify-between py-8 border-b border-[#1E1C1A]">
<div class="flex flex-col">
<span class="text-6xl font-[100] tracking-tighter text-on-background">06:30</span>
<span class="text-[10px] tracking-[0.3em] font-light text-[#6B6560] mt-2">月 火 水 木 金</span>
</div>
<div class="relative inline-flex items-center cursor-pointer group">
<div class="w-12 h-6 bg-[#D4A574] rounded-full transition-colors duration-300"></div>
<div class="absolute left-7 w-4 h-4 bg-[#F5F0EB] rounded-full transition-all duration-300 shadow-sm"></div>
</div>
</div>
<!-- Active Alarm Card 2 -->
<div class="flex items-center justify-between py-8 border-b border-[#1E1C1A]">
<div class="flex flex-col">
<span class="text-6xl font-[100] tracking-tighter text-on-background">07:15</span>
<span class="text-[10px] tracking-[0.3em] font-light text-[#6B6560] mt-2">月 火 水 木 金</span>
</div>
<div class="relative inline-flex items-center cursor-pointer group">
<div class="w-12 h-6 bg-[#D4A574] rounded-full transition-colors duration-300"></div>
<div class="absolute left-7 w-4 h-4 bg-[#F5F0EB] rounded-full transition-all duration-300 shadow-sm"></div>
</div>
</div>
<!-- Inactive Alarm Card -->
<div class="flex items-center justify-between py-8 border-b border-[#1E1C1A] opacity-30">
<div class="flex flex-col">
<span class="text-6xl font-[100] tracking-tighter text-on-background">09:00</span>
<span class="text-[10px] tracking-[0.3em] font-light text-[#6B6560] mt-2">土 日</span>
</div>
<div class="relative inline-flex items-center cursor-pointer group">
<div class="w-12 h-6 bg-[#1E1C1A] rounded-full transition-colors duration-300"></div>
<div class="absolute left-1 w-4 h-4 bg-[#6B6560] rounded-full transition-all duration-300"></div>
</div>
</div>
</section>
</main>
<!-- Floating Action Button -->
<div class="fixed bottom-32 left-0 w-full flex justify-center pointer-events-none">
<button class="pointer-events-auto w-14 h-14 rounded-full bg-[#1E1C1A] flex items-center justify-center text-[#D4A574] shadow-2xl hover:scale-105 active:scale-95 transition-transform duration-300">
<span class="material-symbols-outlined text-3xl font-light">add</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="bg-[#0A0A0A]/80 backdrop-blur-xl fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-10 pb-8 h-24 rounded-t-[2rem] border-t border-[#1E1C1A]">
<div class="flex flex-col items-center justify-center text-[#D4A574] bg-[#201F1F] rounded-full p-3 hover:text-[#D4A574] transition-colors active:haptic-pulse scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="alarm">alarm</span>
</div>
<div class="flex flex-col items-center justify-center text-[#6B6560] p-3 hover:text-[#D4A574] transition-colors active:haptic-pulse scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
</div>
<div class="flex flex-col items-center justify-center text-[#6B6560] p-3 hover:text-[#D4A574] transition-colors active:haptic-pulse scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</div>
</nav>
</body></html>
