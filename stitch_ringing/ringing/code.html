<!DOCTYPE html>

<html class="dark" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QRバーコードアラーム - 鳴動中</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error": "#ffb4ab",
              "tertiary": "#ffb7b6",
              "outline": "#9c8e82",
              "on-primary-fixed": "#2c1700",
              "on-error-container": "#ffdad6",
              "on-tertiary": "#581b1e",
              "on-surface-variant": "#d4c4b7",
              "primary-container": "#d4a574",
              "inverse-on-surface": "#313030",
              "outline-variant": "#50453b",
              "tertiary-fixed": "#ffdad9",
              "secondary-fixed-dim": "#cdc5bf",
              "on-error": "#690005",
              "error-container": "#93000a",
              "surface-container": "#201f1f",
              "surface-container-highest": "#353534",
              "surface-container-lowest": "#0e0e0e",
              "secondary-container": "#4b4641",
              "on-primary-fixed-variant": "#614018",
              "surface": "#131313",
              "on-tertiary-fixed": "#3c060b",
              "tertiary-container": "#f09594",
              "on-primary-container": "#5b3a13",
              "background": "#131313",
              "surface-container-low": "#1c1b1b",
              "surface-tint": "#efbd8a",
              "on-tertiary-container": "#6e2c2e",
              "surface-bright": "#3a3939",
              "on-background": "#e5e2e1",
              "on-primary": "#472a03",
              "surface-container-high": "#2a2a2a",
              "on-secondary-fixed": "#1f1b17",
              "on-tertiary-fixed-variant": "#753133",
              "inverse-primary": "#7c572d",
              "on-surface": "#e5e2e1",
              "surface-dim": "#131313",
              "inverse-surface": "#e5e2e1",
              "secondary-fixed": "#eae1da",
              "on-secondary-container": "#bcb4ae",
              "on-secondary-fixed-variant": "#4b4641",
              "primary-fixed": "#ffdcbc",
              "tertiary-fixed-dim": "#ffb3b2",
              "primary-fixed-dim": "#efbd8a",
              "on-secondary": "#34302b",
              "primary": "#f2c08d",
              "surface-variant": "#353534",
              "secondary": "#cdc5bf"
            },
            fontFamily: {
              "headline": ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica", "Arial", "sans-serif"],
              "body": ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica", "Arial", "sans-serif"],
              "label": ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica", "Arial", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .pulse-subtle {
            animation: pulse-warm 4s ease-in-out infinite;
        }
        @keyframes pulse-warm {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }
        .bg-mesh-glow {
            background: radial-gradient(circle at center, rgba(212, 165, 116, 0.05) 0%, rgba(10, 10, 10, 0) 70%);
        }
        body {
            min-height: max(884px, 100dvh);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-[#0A0A0A] text-on-background font-body min-h-screen flex flex-col overflow-hidden">
<div class="fixed inset-0 bg-mesh-glow pointer-events-none"></div>
<main class="flex-grow flex flex-col items-center justify-center px-10 relative z-10">
<div class="text-center space-y-4">
<p class="font-headline font-light tracking-[0.4em] text-secondary text-xs opacity-60 uppercase mb-8">Alarm Ringing</p>
<div class="pulse-subtle">
<h1 class="font-headline font-thin text-[8rem] md:text-[12rem] leading-none tracking-tighter text-[#F5F0EB]">
                    07:30
                </h1>
</div>
<div class="pt-4">
<p class="font-body font-light text-primary tracking-widest text-lg">おはようございます</p>
</div>
</div>
</main>
<footer class="w-full px-10 pb-16 space-y-6 max-w-md mx-auto relative z-20">
<button class="w-full py-6 bg-primary-container text-on-primary-container font-headline font-medium text-lg rounded-full flex items-center justify-center gap-3 transition-transform active:scale-95 duration-300 shadow-2xl shadow-primary-container/10">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
<span>スキャンして解除</span>
</button>
<button class="w-full py-5 bg-surface-container text-[#6B6560] font-headline font-medium text-md rounded-full flex items-center justify-center gap-2 hover:bg-surface-container-high transition-colors active:scale-95 duration-300">
<span class="material-symbols-outlined text-sm" data-icon="snooze">snooze</span>
<span>スヌーズ（5分）</span>
</button>
</footer>
<div class="fixed top-12 left-0 w-full flex justify-center opacity-20 pointer-events-none">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#6B6560] text-sm" data-icon="notifications_active" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
<span class="text-[10px] font-headline font-light tracking-[0.2em] text-[#6B6560] uppercase">Synchronized Time</span>
</div>
</div>
</body></html>
