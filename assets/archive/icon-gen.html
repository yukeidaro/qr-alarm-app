<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1024px; height: 1024px; overflow: hidden; }
  .icon {
    width: 1024px;
    height: 1024px;
    background: linear-gradient(145deg, #FAF7F4 0%, #F5F0EB 40%, #EDE8E3 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-radius: 224px; /* iOS style rounded corners */
  }

  /* Subtle warm glow behind the main element */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232,168,56,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }

  .clock-body {
    position: relative;
    width: 520px;
    height: 520px;
    background: #FFFFFF;
    border-radius: 50%;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.08),
      0 2px 8px rgba(0,0,0,0.04),
      inset 0 2px 4px rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Clock bells */
  .bell-left, .bell-right {
    position: absolute;
    width: 140px;
    height: 140px;
    background: #E8A838;
    border-radius: 50%;
    top: -50px;
    box-shadow: 0 4px 12px rgba(232,168,56,0.3);
  }
  .bell-left { left: 80px; }
  .bell-right { right: 80px; }

  /* Bell connector bar */
  .bell-bar {
    position: absolute;
    top: -20px;
    width: 200px;
    height: 12px;
    background: #C49030;
    border-radius: 6px;
  }

  /* Hammer on top */
  .hammer {
    position: absolute;
    top: -75px;
    width: 16px;
    height: 50px;
    background: #C49030;
    border-radius: 8px;
  }
  .hammer-ball {
    position: absolute;
    top: -90px;
    width: 36px;
    height: 36px;
    background: #C49030;
    border-radius: 50%;
  }

  /* Clock legs */
  .leg-left, .leg-right {
    position: absolute;
    bottom: -40px;
    width: 16px;
    height: 60px;
    background: #C49030;
    border-radius: 8px;
  }
  .leg-left { left: 140px; transform: rotate(20deg); }
  .leg-right { right: 140px; transform: rotate(-20deg); }

  /* QR code pattern inside clock */
  .qr-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(7, 1fr);
    width: 280px;
    height: 280px;
    gap: 6px;
    position: relative;
    z-index: 2;
  }

  .qr-cell {
    border-radius: 6px;
    transition: all 0.3s;
  }
  .qr-dark {
    background: #4A3200;
  }
  .qr-light {
    background: rgba(232,168,56,0.12);
  }
  .qr-accent {
    background: #E8A838;
  }

  /* Clock hour markers */
  .marker {
    position: absolute;
    width: 8px;
    height: 24px;
    background: #E8A838;
    border-radius: 4px;
  }
  .marker-12 { top: 20px; left: 50%; transform: translateX(-50%); }
  .marker-3 { right: 20px; top: 50%; transform: translateY(-50%) rotate(90deg); }
  .marker-6 { bottom: 20px; left: 50%; transform: translateX(-50%); }
  .marker-9 { left: 20px; top: 50%; transform: translateY(-50%) rotate(90deg); }
</style>
</head>
<body>
  <div class="icon">
    <div class="glow"></div>
    <div class="clock-body">
      <div class="bell-left"></div>
      <div class="bell-right"></div>
      <div class="bell-bar"></div>
      <div class="hammer"></div>
      <div class="hammer-ball"></div>
      <div class="leg-left"></div>
      <div class="leg-right"></div>

      <!-- Hour markers -->
      <div class="marker marker-12"></div>
      <div class="marker marker-3"></div>
      <div class="marker marker-6"></div>
      <div class="marker marker-9"></div>

      <!-- QR code pattern -->
      <div class="qr-grid">
        <!-- Row 1 -->
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-light"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <!-- Row 2 -->
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-light"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-accent"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-light"></div>
        <div class="qr-cell qr-dark"></div>
        <!-- Row 3 -->
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-light"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <!-- Row 4 -->
        <div class="qr-cell qr-light"></div>
        <div class="qr-cell qr-accent"></div>
        <div class="qr-cell qr-light"></div>
        <div class="qr-cell qr-accent"></div>
        <div class="qr-cell qr-light"></div>
        <div class="qr-cell qr-accent"></div>
        <div class="qr-cell qr-light"></div>
        <!-- Row 5 -->
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-light"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <!-- Row 6 -->
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-light"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-accent"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-light"></div>
        <div class="qr-cell qr-dark"></div>
        <!-- Row 7 -->
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-light"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
        <div class="qr-cell qr-dark"></div>
      </div>
    </div>
  </div>
</body>
</html>
