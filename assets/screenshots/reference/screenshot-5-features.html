<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1290px;
  height: 2796px;
  background: linear-gradient(160deg, #1A1714 0%, #2A2520 50%, #1A1714 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  overflow: hidden;
}

.catchphrase {
  margin-top: 120px;
  text-align: center;
  color: #FFFFFF;
  font-size: 64px;
  font-weight: 800;
  line-height: 1.3;
  letter-spacing: 2px;
}

.phone-frame {
  margin-top: 80px;
  width: 380px;
  height: 820px;
  background: #000000;
  border-radius: 55px;
  padding: 12px;
  position: relative;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 2px #333;
  transform: perspective(1200px) rotateY(-2deg) rotateX(1deg);
}

.dynamic-island {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 34px;
  background: #000;
  border-radius: 20px;
  z-index: 10;
}

.screen {
  width: 100%;
  height: 100%;
  background: #F5F0EB;
  border-radius: 45px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 70px 24px 40px;
}

.features-title {
  font-size: 24px;
  font-weight: 700;
  color: #1A1A1A;
  margin-bottom: 32px;
}

.feature-card {
  width: 100%;
  background: #FFFFFF;
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.feature-icon {
  width: 50px;
  height: 50px;
  min-width: 50px;
  background: #FDF3E0;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.feature-text {}

.feature-name {
  font-size: 16px;
  font-weight: 700;
  color: #1A1A1A;
  margin-bottom: 3px;
}

.feature-desc {
  font-size: 13px;
  color: #9B9590;
  font-weight: 500;
}

.feature-badge {
  display: inline-block;
  background: #E8A838;
  color: #4A3200;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 6px;
  margin-top: 4px;
}

.app-brand {
  margin-top: auto;
  text-align: center;
}

.app-brand-name {
  font-size: 28px;
  font-weight: 800;
  color: #1A1A1A;
}

.app-brand-tag {
  font-size: 14px;
  color: #9B9590;
  margin-top: 4px;
}
</style>
</head>
<body>
  <div class="catchphrase">無料で全機能<br>サブスク不要</div>

  <div class="phone-frame">
    <div class="dynamic-island"></div>
    <div class="screen">
      <div class="features-title">すべての機能が無料</div>

      <div class="feature-card">
        <div class="feature-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="#E8A838"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#E8A838" stroke-width="2" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#E8A838" stroke-width="2" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="#E8A838" stroke-width="2" fill="none"/><rect x="15" y="15" width="2" height="2" fill="#E8A838"/><rect x="18" y="15" width="2" height="2" fill="#E8A838"/><rect x="15" y="18" width="2" height="2" fill="#E8A838"/><rect x="18" y="18" width="2" height="2" fill="#E8A838"/></svg>
        </div>
        <div class="feature-text">
          <div class="feature-name">QRコード / バーコードスキャン</div>
          <span class="feature-badge">完全無料</span>
        </div>
      </div>

      <div class="feature-card">
        <div class="feature-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#E8A838" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        </div>
        <div class="feature-text">
          <div class="feature-name">20種類以上のアラーム音</div>
          <div class="feature-desc">朝にぴったりのサウンド</div>
        </div>
      </div>

      <div class="feature-card">
        <div class="feature-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#E8A838" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h3M18 12h3M12 3v3M12 18v3"/><circle cx="12" cy="12" r="3" fill="#E8A838" opacity="0.3"/></svg>
        </div>
        <div class="feature-text">
          <div class="feature-name">4言語対応</div>
          <div class="feature-desc">日本語 / English / 한국어 / Espanol</div>
        </div>
      </div>

      <div class="feature-card">
        <div class="feature-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#E8A838" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4" stroke="#E8A838" stroke-width="2.5"/></svg>
        </div>
        <div class="feature-text">
          <div class="feature-name">広告は最小限</div>
          <div class="feature-desc">快適な使い心地を最優先</div>
        </div>
      </div>

      <div class="app-brand">
        <div class="app-brand-name">ScanAlarm</div>
        <div class="app-brand-tag">QRコードで確実に起きる</div>
      </div>
    </div>
  </div>
</body>
</html>
