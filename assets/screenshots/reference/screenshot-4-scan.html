<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1290px;
  height: 2796px;
  background: linear-gradient(160deg, #1A1714 0%, #2A2520 50%, #1A1714 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  overflow: hidden;
}

.catchphrase {
  margin-top: 120px;
  text-align: center;
  color: #FFFFFF;
  font-size: 64px;
  font-weight: 800;
  line-height: 1.3;
  letter-spacing: 2px;
}

.phone-frame {
  margin-top: 80px;
  width: 380px;
  height: 820px;
  background: #000000;
  border-radius: 55px;
  padding: 12px;
  position: relative;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 2px #333;
  transform: perspective(1200px) rotateY(-2deg) rotateX(1deg);
}

.dynamic-island {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 34px;
  background: #000;
  border-radius: 20px;
  z-index: 10;
}

.screen {
  width: 100%;
  height: 100%;
  background: #1A1A1A;
  border-radius: 45px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Simulated dark camera view */
.camera-bg {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, #2A2A2A 0%, #1A1A1A 30%, #222 70%, #1A1A1A 100%);
}

.torch-icon {
  position: absolute;
  top: 70px;
  right: 24px;
  z-index: 5;
}

.scan-instruction {
  position: relative;
  z-index: 5;
  margin-top: 180px;
  font-size: 17px;
  color: rgba(255,255,255,0.9);
  font-weight: 500;
  text-align: center;
  margin-bottom: 24px;
}

.scan-frame-container {
  position: relative;
  z-index: 5;
  width: 240px;
  height: 240px;
}

.scan-frame {
  width: 100%;
  height: 100%;
  border: 2.5px solid rgba(255,255,255,0.4);
  border-radius: 20px;
  position: relative;
}

/* Gold corner accents */
.corner {
  position: absolute;
  width: 36px;
  height: 36px;
}

.corner-tl {
  top: -2px; left: -2px;
  border-top: 4px solid #E8A838;
  border-left: 4px solid #E8A838;
  border-top-left-radius: 20px;
}

.corner-tr {
  top: -2px; right: -2px;
  border-top: 4px solid #E8A838;
  border-right: 4px solid #E8A838;
  border-top-right-radius: 20px;
}

.corner-bl {
  bottom: -2px; left: -2px;
  border-bottom: 4px solid #E8A838;
  border-left: 4px solid #E8A838;
  border-bottom-left-radius: 20px;
}

.corner-br {
  bottom: -2px; right: -2px;
  border-bottom: 4px solid #E8A838;
  border-right: 4px solid #E8A838;
  border-bottom-right-radius: 20px;
}

/* Scan line animation */
.scan-line {
  position: absolute;
  top: 40%;
  left: 10%;
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #E8A838, transparent);
  opacity: 0.8;
}

.scan-sub {
  position: relative;
  z-index: 5;
  margin-top: 24px;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  text-align: center;
  max-width: 260px;
  line-height: 1.5;
}
</style>
</head>
<body>
  <div class="catchphrase">スキャンするだけ<br>かんたん解除</div>

  <div class="phone-frame">
    <div class="dynamic-island"></div>
    <div class="screen">
      <div class="camera-bg"></div>

      <div class="torch-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2">
          <path d="M9 18h6"/>
          <path d="M10 22h4"/>
          <path d="M12 2v1"/>
          <path d="M12 7a3 3 0 0 0-3 3v4h6v-4a3 3 0 0 0-3-3z" fill="rgba(255,255,255,0.15)"/>
        </svg>
      </div>

      <div class="scan-instruction">QRコードをスキャンしてください</div>

      <div class="scan-frame-container">
        <div class="scan-frame">
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          <div class="scan-line"></div>
        </div>
      </div>

      <div class="scan-sub">登録済みのコードにカメラを向けてください</div>
    </div>
  </div>
</body>
</html>
