<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1290px;
  height: 2796px;
  background: linear-gradient(160deg, #1A1714 0%, #2A2520 50%, #1A1714 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  overflow: hidden;
}

.catchphrase {
  margin-top: 120px;
  text-align: center;
  color: #FFFFFF;
  font-size: 64px;
  font-weight: 800;
  line-height: 1.3;
  letter-spacing: 2px;
}

.phone-frame {
  margin-top: 80px;
  width: 380px;
  height: 820px;
  background: #000000;
  border-radius: 55px;
  padding: 12px;
  position: relative;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 2px #333;
  transform: perspective(1200px) rotateY(-2deg) rotateX(1deg);
}

.dynamic-island {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 34px;
  background: #000;
  border-radius: 20px;
  z-index: 10;
}

.screen {
  width: 100%;
  height: 100%;
  background: #F5F0EB;
  border-radius: 45px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(232,168,56,0.2) 0%, rgba(232,168,56,0) 70%);
  top: 25%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.ring-time {
  font-size: 96px;
  font-weight: 800;
  color: #1A1A1A;
  line-height: 1;
  position: relative;
  z-index: 2;
}

.ring-greeting {
  font-size: 22px;
  color: #4A4A4A;
  font-style: italic;
  margin-top: 8px;
  margin-bottom: 80px;
  position: relative;
  z-index: 2;
}

.scan-btn {
  width: 280px;
  padding: 18px 0;
  background: #E8A838;
  border-radius: 16px;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
  z-index: 2;
  box-shadow: 0 4px 20px rgba(232,168,56,0.4);
}

.scan-btn-text {
  font-size: 20px;
  font-weight: 700;
  color: #4A3200;
}

.snooze-btn {
  margin-top: 16px;
  width: 280px;
  padding: 16px 0;
  background: #E8E4E0;
  border-radius: 16px;
  text-align: center;
  position: relative;
  z-index: 2;
}

.snooze-text {
  font-size: 16px;
  font-weight: 500;
  color: #9B9590;
}
</style>
</head>
<body>
  <div class="catchphrase">ベッドから出ないと<br>止まらない</div>

  <div class="phone-frame">
    <div class="dynamic-island"></div>
    <div class="screen">
      <div class="glow"></div>
      <div class="ring-time">06:30</div>
      <div class="ring-greeting">おはようございます</div>

      <div class="scan-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#4A3200"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#4A3200" stroke-width="2" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#4A3200" stroke-width="2" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="#4A3200" stroke-width="2" fill="none"/><rect x="15" y="15" width="2" height="2" fill="#4A3200"/><rect x="18" y="15" width="2" height="2" fill="#4A3200"/><rect x="15" y="18" width="2" height="2" fill="#4A3200"/><rect x="18" y="18" width="2" height="2" fill="#4A3200"/></svg>
        <span class="scan-btn-text">スキャンして解除</span>
      </div>

      <div class="snooze-btn">
        <span class="snooze-text">スヌーズ (残り3回)</span>
      </div>
    </div>
  </div>
</body>
</html>
