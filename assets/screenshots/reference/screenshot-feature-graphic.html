<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1024px;
  height: 500px;
  background: linear-gradient(135deg, #F5F0EB 0%, #EDE5DB 50%, #F5F0EB 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  overflow: hidden;
  position: relative;
}

/* Decorative circles */
.deco-1 {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,168,56,0.15) 0%, transparent 70%);
  top: -80px;
  right: -60px;
}

.deco-2 {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,168,56,0.1) 0%, transparent 70%);
  bottom: -60px;
  left: -40px;
}

.content {
  display: flex;
  align-items: center;
  gap: 60px;
  position: relative;
  z-index: 2;
}

.text-side {
  text-align: left;
}

.app-name {
  font-size: 56px;
  font-weight: 800;
  color: #1A1A1A;
  line-height: 1.1;
  margin-bottom: 12px;
}

.tagline {
  font-size: 22px;
  color: #4A4A4A;
  font-weight: 500;
  margin-bottom: 20px;
}

.badges {
  display: flex;
  gap: 10px;
}

.badge {
  background: #E8A838;
  color: #4A3200;
  font-size: 13px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 8px;
}

.icon-side {
  width: 180px;
  height: 180px;
  background: linear-gradient(135deg, #E8A838 0%, #D4952E 100%);
  border-radius: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 12px 40px rgba(232,168,56,0.3);
}
</style>
</head>
<body>
  <div class="deco-1"></div>
  <div class="deco-2"></div>

  <div class="content">
    <div class="text-side">
      <div class="app-name">ScanAlarm</div>
      <div class="tagline">QRコードで確実に起きる</div>
      <div class="badges">
        <span class="badge">完全無料</span>
        <span class="badge">4言語対応</span>
        <span class="badge">広告最小限</span>
      </div>
    </div>
    <div class="icon-side">
      <svg width="90" height="90" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="#FFFFFF" stroke-width="2" fill="none"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="#FFFFFF" stroke-width="2" fill="none"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="#FFFFFF" stroke-width="2" fill="none"/>
        <rect x="5" y="5" width="3" height="3" rx="0.5" fill="#FFFFFF"/>
        <rect x="16" y="5" width="3" height="3" rx="0.5" fill="#FFFFFF"/>
        <rect x="5" y="16" width="3" height="3" rx="0.5" fill="#FFFFFF"/>
        <rect x="14" y="14" width="3" height="3" rx="0.5" fill="#FFFFFF"/>
        <rect x="18" y="14" width="3" height="3" rx="0.5" fill="#FFFFFF"/>
        <rect x="14" y="18" width="3" height="3" rx="0.5" fill="#FFFFFF"/>
        <rect x="18" y="18" width="3" height="3" rx="0.5" fill="#FFFFFF"/>
      </svg>
    </div>
  </div>
</body>
</html>
