<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1440px;
    height: 2560px;
    overflow: hidden;
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
  }

  /* App brand color: #E8A838 (gold yellow) */
  .bg-gold {
    background: linear-gradient(180deg, #F2C56B 0%, #C49030 100%);
  }
  .bg-amber {
    background: linear-gradient(180deg, #E8A838 0%, #9A6B1A 100%);
  }
  .bg-dark {
    background: linear-gradient(180deg, #2A2520 0%, #1A1A1A 100%);
  }
  .bg-warm {
    background: linear-gradient(180deg, #D4952E 0%, #7A5510 100%);
  }

  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  .text-block {
    margin-top: 160px;
    text-align: center;
    padding: 0 80px;
    flex-shrink: 0;
  }

  .headline {
    color: #FFFFFF;
    font-weight: 900;
    font-size: 136px;
    line-height: 1.15;
    letter-spacing: -3px;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  }

  .subtitle {
    margin-top: 36px;
    color: rgba(255, 255, 255, 0.8);
    font-weight: 600;
    font-size: 48px;
    line-height: 1.35;
  }

  /* Android-style phone frame — positioned to clip at bottom */
  .phone-container {
    position: absolute;
    top: 920px;
    left: 50%;
    transform: translateX(-50%);
    filter: drop-shadow(0 40px 100px rgba(0, 0, 0, 0.45));
  }

  .phone-frame {
    width: 1100px;
    background: #1A1A1A;
    border-radius: 56px;
    padding: 16px;
    position: relative;
  }

  .phone-screen {
    width: 100%;
    border-radius: 42px;
    overflow: hidden;
    position: relative;
  }

  .phone-screen img {
    width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <div class="content">
    <div class="text-block">
      <h1 class="headline" id="headline"></h1>
      <p class="subtitle" id="subtitle"></p>
    </div>
    <div class="phone-container">
      <div class="phone-frame">
        <div class="phone-screen">
          <img id="phone-img" src="" alt="screen">
        </div>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const headline = params.get('h') || '';
    document.getElementById('headline').innerHTML = headline.replace(/\n/g, '<br>');
    const sub = params.get('s');
    if (sub) {
      document.getElementById('subtitle').textContent = sub;
    } else {
      document.getElementById('subtitle').style.display = 'none';
    }
    // Use the raw screen image (no bezel) - the HTML frame provides the Android bezel
    document.getElementById('phone-img').src = params.get('img') || '';
    document.getElementById('bg').className = 'bg ' + (params.get('bg') || 'bg-amber');
  </script>
</body>
</html>
